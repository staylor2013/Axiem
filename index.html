<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Python Server Test</title>
</head>
<body>

  <h1>Python Server Test</h1>
  <button onclick="register()">Register</button>
  <br>
  <button onclick="login()">Login</button>
  <pre id="output"></pre>

  <script>
    const API = "http://localhost:1234";

    async function register() {
      try {
        const res = await fetch(API + "/register", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({
            username: "test",
            password: "1234"
          })
        });

        const text = await res.text();
        document.getElementById("output").textContent = "REGISTER: " + text;

      } catch (err) {
        document.getElementById("output").textContent = "ERROR: " + err;
      }
    }

    async function login() {
      try {
        const res = await fetch(API + "/login", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({
            username: "test",
            password: "1234"
          })
        });

        const text = await res.text();
        document.getElementById("output").textContent = "LOGIN: " + text;

      } catch (err) {
        document.getElementById("output").textContent = "ERROR: " + err;
      }
    }
  </script>

</body>
</html>
