<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Axiem</title>
</head>

<body>

  <h1>Axiem 🔥</h1>

  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>

  <pre id="output"></pre>

  <script>

    async function register() {

      try {

        const res = await fetch("/register", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            username: "test",
            password: "1234"
          })
        })

        const data = await res.json()

        document.getElementById("output").textContent =
          "REGISTER:\n" + JSON.stringify(data, null, 2)

      } catch (err) {

        document.getElementById("output").textContent =
          "ERROR:\n" + err

      }

    }


    async function login() {

      try {

        const res = await fetch("/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            username: "test",
            password: "1234"
          })
        })

        const data = await res.json()

        document.getElementById("output").textContent =
          "LOGIN:\n" + JSON.stringify(data, null, 2)

      } catch (err) {

        document.getElementById("output").textContent =
          "ERROR:\n" + err

      }

    }

  </script>

</body>

</html>
